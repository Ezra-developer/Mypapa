<!DOCTYPE html>
<html>
<head>
<title>Will You Marry Me? 💍</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Segoe UI;
background:radial-gradient(circle,#1e3c72,#0f2027);
color:white;
overflow:hidden;
}

.container{
position:relative;
}

h1{
font-size:60px;
text-shadow:0 0 30px white;
}

p{
font-size:24px;
margin-top:10px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#1e3c72;
cursor:pointer;
box-shadow:0 0 20px white;
margin:20px;
}

button:hover{
transform:scale(1.1);
}

#noBtn{
position:absolute;
}
</style>
</head>

<body>

<div class="container">

<h1>Suji 💍</h1>

<p>Will You Marry Me?</p>

<button onclick="yesClick()">Yes 💖</button>

<button id="noBtn" onmouseover="moveNo()">No 😅</button>

</div>

<script>

function yesClick(){
alert("You just made me the happiest man ❤️");
}

function moveNo(){

var btn=document.getElementById("noBtn");

var x=Math.floor(Math.random()*300)-150;
var y=Math.floor(Math.random()*300)-150;

btn.style.transform="translate("+x+"px,"+y+"px)";
}

</script>

</body>
</html>
