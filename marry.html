<!DOCTYPE html>
<html>
<head>

<title>Will You Marry Me Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;

/* PINK ROMANTIC BACKGROUND */

background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.7;
}

.container{
position:relative;
z-index:10;
}

/* TITLE */

h1{
font-size:70px;
text-shadow:0 0 40px white;
margin-bottom:20px;
}

p{
font-size:26px;
margin-bottom:40px;
}

/* BUTTONS */

button{
padding:18px 45px;
border-radius:40px;
border:none;
font-size:20px;
cursor:pointer;
margin:10px;
box-shadow:0 0 25px rgba(255,255,255,0.8);
}

/* YES BUTTON */

.yes{
background:white;
color:#333;
}

/* NO BUTTON */

.no{
background:#ff4d6d;
color:white;
position:absolute;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="container">

<h1>Suji 💍</h1>

<p>Will You Marry Me?</p>

<button class="yes" onclick="goNext()">
Yes ❤️
</button>

<button class="no" id="noBtn" onmouseover="moveNo()">
No 😅
</button>

</div>

<script>

/* YES BUTTON */

function goNext(){
window.location.href="final.html"
}

/* NO BUTTON RUN AWAY */

function moveNo(){

let btn=document.getElementById("noBtn")

let x=Math.floor(Math.random()*300)-150
let y=Math.floor(Math.random()*300)-150

btn.style.transform="translate("+x+"px,"+y+"px)"

}

</script>

</body>
</html>
