<!DOCTYPE html>
<html>
<head>

<title>Will You Marry Me Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.7;
}

/* FLOATING IMAGES */

.floating-img{
position:absolute;
width:130px;
height:160px;
object-fit:cover;
border-radius:15px;
opacity:0.5;
box-shadow:0 0 25px rgba(255,255,255,0.6);
animation:float 8s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.img1{top:8%; left:8%;}
.img2{bottom:10%; left:12%;}
.img3{top:8%; right:8%;}
.img4{bottom:10%; right:12%;}

/* MAIN */

.container{
position:relative;
z-index:10;
max-width:700px;
}

/* TITLE */

h1{
font-size:60px;
text-shadow:0 0 40px white;
margin-bottom:10px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 20px white;}
to{ text-shadow:0 0 60px #fff;}
}

p{
font-size:22px;
margin-bottom:40px;
line-height:1.6;
}

/* BUTTONS */

button{
padding:18px 45px;
border-radius:40px;
border:none;
font-size:20px;
cursor:pointer;
margin:10px;
box-shadow:0 0 25px rgba(255,255,255,0.8);
transition:0.2s;
}

/* YES BUTTON */

.yes{
background:white;
color:#333;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* NO BUTTON */

.no{
background:#ff4d6d;
color:white;
position:fixed;
}

/* HEART FALL */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px); opacity:1;}
100%{transform:translateY(110vh); opacity:0;}
}

</style>

</head>

<body>

<!-- IMAGES -->

<img src="pic1.jpg" class="floating-img img1">
<img src="pic4.jpg" class="floating-img img2">
<img src="pic8.jpg" class="floating-img img3">
<img src="pic9.jpg" class="floating-img img4">

<div class="container">

<h1>Will You Marry Me 💍</h1>

<p>
From the moment you came into my life,<br>
everything became beautiful 💖<br><br>
I don't want just today…<br>
I want forever with you ❤️
</p>

<button class="yes" onclick="goNext()">Yes ❤️</button>

<button class="no" id="noBtn">No 😅</button>

</div>

<script>

/* YES */

function goNext(){
window.location.href="final.html"
}

/* ULTRA FAST NO BUTTON */

let btn = document.getElementById("noBtn")

document.addEventListener("mousemove", function(e){

let rect = btn.getBoundingClientRect()

let distance = Math.hypot(
e.clientX - (rect.left + rect.width/2),
e.clientY - (rect.top + rect.height/2)
)

if(distance < 120){

let x = Math.random() * (window.innerWidth - 100)
let y = Math.random() * (window.innerHeight - 100)

btn.style.left = x + "px"
btn.style.top = y + "px"

}

})

/* HEART RAIN */

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*2)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,400)

</script>

</body>
</html>
