<!DOCTYPE html>
<html>
<head>

<title>Will You Marry Me</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* FLOAT IMAGES */

.floating-img{
position:absolute;
width:120px;
height:150px;
object-fit:cover;
border-radius:15px;
opacity:0.6;
box-shadow:0 0 20px rgba(255,255,255,0.6);
animation:float 6s infinite ease-in-out;
z-index:2;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.img1{top:10%; left:8%;}
.img2{bottom:10%; left:12%;}
.img3{top:10%; right:8%;}
.img4{bottom:10%; right:12%;}

/* MAIN */

.container{
position:relative;
z-index:10;
max-width:600px;
padding:20px;
}

/* TITLE */

h1{
font-size:55px;
text-shadow:0 0 30px white;
margin-bottom:20px;
}

/* MESSAGE */

.message{
font-size:18px;
line-height:1.6;
max-width:500px;
margin:auto;
margin-bottom:30px;
}

/* BUTTON GROUP */

.btn-group{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

/* BUTTON */

button{
padding:16px 40px;
border-radius:40px;
border:none;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,0.8);
transition:0.2s;
}

/* YES */

.yes{
background:white;
color:#333;
}

/* NO */

.no{
background:#ff4d6d;
color:white;
position:relative;
}

/* HOVER EFFECT */

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- FLOATING IMAGES -->

<img src="pic1.jpg" class="floating-img img1">
<img src="pic4.jpg" class="floating-img img2">
<img src="pic8.jpg" class="floating-img img3">
<img src="pic9.jpg" class="floating-img img4">

<div class="container">

<h1>Papa 💍</h1>

<div class="message">

Un happiness dhaan en happiness papa 😊 <br>
Idhu God kudutha blessing 💖 <br><br>

Un kooda dhaan en whole life spend panna aasai 💕 <br><br>

Namma rendu perum Jesus kaga serve panna porom nu naan namburen 🙏✝️ <br><br>

Un kooda sedhu love oda, faith oda Jesus ku serve panna aasai ❤️ <br><br>

<b>So… Will you marry me? 💍❤️</b>

</div>

<div class="btn-group">

<button class="yes" onclick="goNext()">Yes 💖</button>

<button class="no" id="noBtn"
onmouseover="moveNo()">No 😅</button>

</div>

</div>

<!-- MUSIC -->

<audio id="bgMusic" loop>
<source src="voice.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSIC */

document.addEventListener("click", function(){
document.getElementById("bgMusic").play()
}, { once:true })

/* YES */

function goNext(){
window.location.href="final.html"
}

/* SUPER FAST NO BUTTON */

function moveNo(){

let btn = document.getElementById("noBtn")

// change to fixed when moving
btn.style.position = "fixed"

let x = Math.random() * (window.innerWidth - 120)
let y = Math.random() * (window.innerHeight - 60)

btn.style.left = x + "px"
btn.style.top = y + "px"

}

</script>

</body>
</html>
