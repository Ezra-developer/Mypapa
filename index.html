<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent),
radial-gradient(2px 2px at 70% 40%,white,transparent);
opacity:0.7;
}

/* FLOATING IMAGES */

.floating-img{
position:absolute;
width:120px;
height:150px;
object-fit:cover;
border-radius:15px;
opacity:0.5;
animation:float 10s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

/* POSITIONS */

.img1{top:10%; left:10%;}
.img2{top:70%; left:15%;}
.img3{top:20%; right:10%;}
.img4{bottom:10%; right:15%;}

/* CONTAINER */

.container{
position:relative;
z-index:10;
}

/* TITLE */

h1{
font-size:70px;
text-shadow:0 0 40px white;
}

/* DOB */

.dob{
font-size:22px;
margin-bottom:25px;
}

/* COUNTER */

.counter{
font-size:22px;
line-height:1.8;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:18px 50px;
border-radius:40px;
background:rgba(255,255,255,0.9);
color:#333;
font-size:20px;
text-decoration:none;
box-shadow:0 0 30px rgba(255,255,255,0.9);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- FLOATING IMAGES -->

<img src="pic7.jpg" class="floating-img img1">
<img src="pic6.jpg" class="floating-img img2">
<img src="pic5.jpg" class="floating-img img3">
<img src="pic2.jpg" class="floating-img img4">

<div class="container">

<h1>Happy Birthday Suji 🌙✨</h1>

<div class="dob">
23 / 03 / 2004 🎂
</div>

<div class="counter">
<div id="line1"></div>
<div id="line2"></div>
</div>

<a class="btn" href="marry.html">
See My Heart ❤️
</a>

</div>

<script>

let dob = new Date("2004-03-23")

function updateLife(){

let now = new Date()

let diff = now - dob

let seconds = Math.floor(diff/1000)
let minutes = Math.floor(diff/60000)
let hours = Math.floor(diff/3600000)
let days = Math.floor(diff/86400000)
let months = Math.floor(days/30.44)
let years = Math.floor(days/365.25)

document.getElementById("line1").innerHTML =
years+" Years • "+months+" Months"

document.getElementById("line2").innerHTML =
days+" Days • "+hours.toLocaleString()+" Hours • "+minutes.toLocaleString()+" Minutes • "+seconds.toLocaleString()+" Seconds"

}

setInterval(updateLife,1000)

</script>

</body>
</html>
