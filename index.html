<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;

/* NIGHT SKY THEME */

background:
radial-gradient(circle at 50% 20%,rgba(255,255,255,0.08),transparent 60%),
linear-gradient(#1b1b3a,#070716);
overflow:hidden;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 10% 20%,white,transparent),
radial-gradient(2px 2px at 30% 40%,white,transparent),
radial-gradient(2px 2px at 70% 30%,white,transparent),
radial-gradient(2px 2px at 90% 60%,white,transparent),
radial-gradient(2px 2px at 40% 80%,white,transparent),
radial-gradient(2px 2px at 60% 50%,white,transparent);
opacity:0.8;
}

/* CONTAINER */

.container{
position:relative;
z-index:1;
}

/* TITLE */

h1{
font-size:70px;
text-shadow:0 0 25px white;
margin-bottom:10px;
}

/* DOB */

.dob{
font-size:22px;
margin-bottom:20px;
opacity:0.9;
}

/* AGE COUNTER */

#age{
font-size:26px;
margin-top:20px;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:16px 45px;
border-radius:40px;
background:rgba(255,255,255,0.85);
color:#333;
font-size:20px;
text-decoration:none;
box-shadow:0 0 25px white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Suji 🌙✨</h1>

<div class="dob">
23 / 03 / 2004 🎂
</div>

<div>
Suji's Beautiful Journey 💫
</div>

<div id="age"></div>

<a class="btn" href="marry.html">
See My Heart ❤️
</a>

</div>

<script>

/* AGE COUNTER FROM DOB */

function updateAge(){

let dob = new Date(2004,2,23)

let now = new Date()

let diff = now - dob

let seconds = Math.floor(diff/1000)
let minutes = Math.floor(seconds/60)
let hours = Math.floor(minutes/60)
let days = Math.floor(hours/24)
let years = Math.floor(days/365)

seconds = seconds % 60
minutes = minutes % 60
hours = hours % 24
days = days % 365

document.getElementById("age").innerHTML =
years+" Years "+
days+" Days "+
hours+" Hours "+
minutes+" Min "+
seconds+" Sec"

}

setInterval(updateAge,1000)

</script>

</body>
</html>
