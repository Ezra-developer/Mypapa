<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Suji ❤️</title>
<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1e3c72, #0f2027);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

.content {
    animation: fadeIn 3s ease-in-out;
}

h1 {
    font-size: 50px;
    text-shadow: 0 0 20px #ffffff;
}

p {
    font-size: 22px;
    width: 70%;
    margin: auto;
    margin-top: 20px;
    line-height: 1.6;
}

button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #1e3c72;
    cursor: pointer;
    box-shadow: 0 0 15px white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px white;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="content">
    <h1>Happy Birthday Suji 🌙✨</h1>
    <p>
        23rd March la God en life la biggest blessing ah anupinaru.
        Ni vandhathuku apram dhaan en life ku direction kidaichathu.
        You are not just my love... you are my destiny.
    </p>

    <button onclick="showMessage()">Touch the Sky 💫</button>
</div>

<script>
function showMessage() {
    alert("With God as our guide, I want to walk this life with you forever ❤️");
}

/* Create Stars */
for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.animationDuration = (Math.random() * 3 + 1) + "s";
    document.body.appendChild(star);
}
</script>

</body>
</html>
