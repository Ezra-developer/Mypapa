<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Suji ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e3c72, #0f2027);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Hero Section */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

h1 {
    font-size: 50px;
    text-shadow: 0 0 20px white;
}

.countdown {
    font-size: 28px;
    margin-top: 20px;
}

button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #1e3c72;
    cursor: pointer;
    box-shadow: 0 0 15px white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* Section */
.section {
    padding: 80px 20px;
}

.bible {
    font-style: italic;
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Happy Birthday Suji 🌙✨</h1>
    <div class="countdown" id="countdown"></div>
    <button onclick="scrollDown()">Open My Heart 💖</button>
</div>

<div class="section">
    <h2>You Are My Blessing ✝️</h2>
    <p>
        23rd March la God en life la biggest blessing ah anupinaru.
        Ni vandhathuku apram dhaan en life ku direction kidaichathu.
        I’m proud of you my CA Queen.
    </p>

    <div class="bible">
        “For I know the plans I have for you,” declares the Lord. – Jeremiah 29:11
    </div>

    <button onclick="showMessage()">Forever With You ❤️</button>
</div>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c6f8d64c7.mp3?filename=soft-piano-ambient-110997.mp3" type="audio/mpeg">
</audio>

<script>
// Countdown
var birthday = new Date("March 23, 2026 00:00:00").getTime();

var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = birthday - now;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
    days + " Days " + hours + " Hours "
    + minutes + " Minutes " + seconds + " Seconds ";

    if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "It's Your Special Day 🎉";
    }
}, 1000);

// Scroll
function scrollDown() {
    window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
}

// Popup
function showMessage() {
    alert("With God guiding us, I want to walk every season of life with you ❤️");
}

// Stars
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.animationDuration = (Math.random() * 3 + 1) + "s";
    document.body.appendChild(star);
}
</script>

</body>
</html>
