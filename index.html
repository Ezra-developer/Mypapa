<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI';
color:white;
background:radial-gradient(circle at top,#1b1440,#000010);
overflow:hidden;
}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent),
radial-gradient(2px 2px at 70% 40%,white,transparent);
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.4;}
to{opacity:1;}
}

/* HEART ANIMATION */

.heart{
position:absolute;
font-size:20px;
opacity:0;
transition:all 1.5s ease;
}

/* CONTENT */

.container{
position:relative;
z-index:10;
}

/* TITLE */

h1{
font-size:70px;
text-shadow:0 0 40px white;
}

/* DOB */

.dob{
font-size:22px;
margin-bottom:20px;
}

/* COUNTER */

.counter{
font-size:22px;
line-height:1.7;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:18px 50px;
border-radius:40px;
background:white;
color:#222;
font-size:20px;
text-decoration:none;
box-shadow:0 0 40px white;
cursor:pointer;
}

.btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>Happy Birthday Suji 🌙✨</h1>

<div class="dob">
23 / 03 / 2004 🎂
</div>

<div class="counter">

<div id="line1"></div>
<div id="line2"></div>

</div>

<div class="btn" onclick="showHeart()">
See My Heart ❤️
</div>

</div>

<script>

/* LIFE COUNTER */

let dob = new Date("2004-03-23")

function updateLife(){

let now = new Date()

let diff = now - dob

let seconds = Math.floor(diff/1000)
let minutes = Math.floor(diff/60000)
let hours = Math.floor(diff/3600000)
let days = Math.floor(diff/86400000)
let months = Math.floor(days/30.44)
let years = Math.floor(days/365.25)

document.getElementById("line1").innerHTML =
years+" Years • "+months+" Months"

document.getElementById("line2").innerHTML =
days+" Days • "+hours.toLocaleString()+" Hours • "+minutes.toLocaleString()+" Minutes • "+seconds.toLocaleString()+" Seconds"

}

setInterval(updateLife,1000)


/* HEART STAR ANIMATION */

function showHeart(){

let heartPositions=[
[50,30],[45,35],[55,35],
[40,45],[60,45],
[45,55],[55,55],
[50,65]
]

heartPositions.forEach(pos=>{

let h=document.createElement("div")

h.innerHTML="❤️"

h.className="heart"

h.style.left=pos[0]+"%"
h.style.top=pos[1]+"%"

document.body.appendChild(h)

setTimeout(()=>{
h.style.opacity=1
},100)

})

/* GO TO NEXT PAGE */

setTimeout(()=>{
window.location.href="marry.html"
},3000)

}

</script>

</body>
</html>
