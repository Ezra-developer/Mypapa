<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday My Dear Papa</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent),
radial-gradient(2px 2px at 70% 40%,white,transparent);
opacity:0.7;
}

/* FLOAT IMAGES */

.floating-img{
position:absolute;
width:120px;
height:150px;
object-fit:cover;
border-radius:15px;
opacity:0.6;
box-shadow:0 0 20px rgba(255,255,255,0.6);
animation:float 8s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

.img1{top:10%; left:8%;}
.img2{bottom:10%; left:12%;}
.img3{top:10%; right:8%;}
.img4{bottom:10%; right:12%;}

/* MAIN */

.container{
position:relative;
z-index:10;
max-width:900px;
padding:20px;
}

/* TITLE GLOW */

h1{
font-size:65px;
text-shadow:0 0 30px white;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 20px white;}
to{ text-shadow:0 0 60px #fff;}
}

/* MESSAGE */

.message{
font-size:20px;
line-height:1.8;
max-width:700px;
margin:auto;
margin-bottom:30px;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* COUNTER */

.counter{
font-size:20px;
line-height:2;
background:rgba(255,255,255,0.1);
padding:15px 20px;
border-radius:15px;
display:inline-block;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:18px 50px;
border-radius:40px;
background:rgba(255,255,255,0.95);
color:#333;
font-size:20px;
text-decoration:none;
box-shadow:0 0 30px rgba(255,255,255,0.9);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* MOBILE */

@media(max-width:600px){
h1{font-size:40px;}
.message{font-size:16px;}
.counter{font-size:16px;}
.floating-img{width:80px;height:100px;}
}

</style>

</head>

<body>

<!-- FLOATING IMAGES -->

<img src="pic7.jpg" class="floating-img img1">
<img src="pic6.jpg" class="floating-img img2">
<img src="pic5.jpg" class="floating-img img3">
<img src="pic2.jpg" class="floating-img img4">

<div class="container">

<h1>Happy Birthday My Dear Papa 🌙✨</h1>

<div class="message">
Happy bday papa 💖 <br>

ena problem vandhalum I'm always with you papa ❤️
</div>

<div class="counter">
<div id="line1"></div>
<div id="line2"></div>
</div>

<br>

<a class="btn" href="marry.html">
See My Heart ❤️
</a>

</div>

<script>

/* EXACT AGE CALCULATION */

let dob = new Date("2004-03-23")

function updateLife(){

let now = new Date()

let years = now.getFullYear() - dob.getFullYear()
let months = now.getMonth() - dob.getMonth()
let days = now.getDate() - dob.getDate()

if(days < 0){
months--
}

if(months < 0){
years--
months += 12
}

/* TIME */

let diff = now - dob

let seconds = Math.floor(diff/1000)
let minutes = Math.floor(diff/60000)
let hours = Math.floor(diff/3600000)
let totalDays = Math.floor(diff/86400000)

document.getElementById("line1").innerHTML =
years+" Years • "+months+" Months • "+totalDays+" Days"

document.getElementById("line2").innerHTML =
hours.toLocaleString()+" Hours • "+
minutes.toLocaleString()+" Minutes • "+
seconds.toLocaleString()+" Seconds"

}

setInterval(updateLife,1000)

</script>

</body>
</html>
