<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday Suji</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI';
color:white;

/* NIGHT SKY */

background:linear-gradient(#0b0b1f,#000010);
overflow:hidden;
}

/* MANY STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 10% 20%,white,transparent),
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 30% 40%,white,transparent),
radial-gradient(2px 2px at 40% 50%,white,transparent),
radial-gradient(2px 2px at 50% 60%,white,transparent),
radial-gradient(2px 2px at 60% 30%,white,transparent),
radial-gradient(2px 2px at 70% 20%,white,transparent),
radial-gradient(2px 2px at 80% 50%,white,transparent),
radial-gradient(2px 2px at 90% 70%,white,transparent),
radial-gradient(2px 2px at 15% 75%,white,transparent),
radial-gradient(2px 2px at 35% 85%,white,transparent),
radial-gradient(2px 2px at 65% 80%,white,transparent),
radial-gradient(2px 2px at 85% 40%,white,transparent);
opacity:0.9;
}

/* CONTENT */

.container{
position:relative;
z-index:1;
}

/* TITLE */

h1{
font-size:65px;
text-shadow:0 0 25px white;
}

/* DOB */

.dob{
font-size:22px;
margin-bottom:20px;
}

/* COUNTER */

.counter{
margin-top:30px;
font-size:22px;
line-height:1.8;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:16px 45px;
border-radius:40px;
background:rgba(255,255,255,0.85);
color:#333;
font-size:20px;
text-decoration:none;
box-shadow:0 0 25px white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Suji 🌙✨</h1>

<div class="dob">
23 / 03 / 2004 🎂
</div>

<div class="counter">

<div id="years"></div>
<div id="months"></div>
<div id="days"></div>
<div id="hours"></div>
<div id="minutes"></div>
<div id="seconds"></div>

</div>

<a class="btn" href="marry.html">
See My Heart ❤️
</a>

</div>

<script>

/* DOB */

let dob = new Date("2004-03-23")

function updateLife(){

let now = new Date()

let diff = now - dob

let seconds = Math.floor(diff/1000)
let minutes = Math.floor(diff/60000)
let hours = Math.floor(diff/3600000)
let days = Math.floor(diff/86400000)
let months = Math.floor(days/30.44)
let years = Math.floor(days/365.25)

document.getElementById("years").innerHTML = years+" Years"
document.getElementById("months").innerHTML = months+" Months"
document.getElementById("days").innerHTML = days+" Days"
document.getElementById("hours").innerHTML = hours.toLocaleString()+" Hours"
document.getElementById("minutes").innerHTML = minutes.toLocaleString()+" Minutes"
document.getElementById("seconds").innerHTML = seconds.toLocaleString()+" Seconds"

}

setInterval(updateLife,1000)

</script>

</body>
</html>
