<!DOCTYPE html>
<html>
<head>

<title>Forever With You</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
padding-top:80px;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.6;
}

/* TITLE */

h1{
font-size:60px;
text-shadow:0 0 40px white;
}

p{
font-size:24px;
max-width:700px;
margin:auto;
margin-top:20px;
}

/* IMAGE */

.slideshow{
margin-top:40px;
}

.slideshow img{
width:300px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.9);
animation:zoom 6s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

/* BUTTON */

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:20px;
background:white;
color:#ff4d6d;
box-shadow:0 0 20px white;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff4d6d;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
transition:0.4s;
z-index:1000;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

/* HEARTS */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* FIREWORK */

.firework{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(8);opacity:0;}
}

</style>

</head>

<body>

<h1>Forever With You ❤️</h1>

<p>
You are not just my love,
you are my blessing and my forever.
Every moment with you is a beautiful gift.
</p>

<div class="slideshow">
<img src="pic3.jpg">
</div>

<button onclick="openSurprise()">Open Surprise 🎁</button>

<!-- POPUP -->

<div class="popup" id="popup">
<h2>I Love You Forever ❤️</h2>
<p>You are my everything Suji 💖</p>
</div>

<!-- MUSIC -->

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c6f8d64c7.mp3">
</audio>

<script>

/* POPUP */

function openSurprise(){
document.getElementById("popup").classList.add("active")
startFireworks()
}

/* HEARTS */

function createHeart(){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*2)+"s"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),6000)
}
setInterval(createHeart,400)

/* FIREWORKS */

function startFireworks(){
setInterval(()=>{
let fire=document.createElement("div")
fire.className="firework"
fire.style.left=Math.random()*100+"vw"
fire.style.top=Math.random()*100+"vh"
document.body.appendChild(fire)
setTimeout(()=>fire.remove(),1000)
},200)
}

</script>

</body>
</html>
