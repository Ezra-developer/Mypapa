<!DOCTYPE html>
<html>
<head>

<title>Forever With You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:60px;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow-y:auto;
}

html{
scroll-behavior:smooth;
}

/* STARS */

body:before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.6;
z-index:0;
}

/* CONTAINER */

.container{
position:relative;
z-index:10;
max-width:600px;
padding:20px;
}

/* TITLE */

h1{
font-size:50px;
text-shadow:0 0 30px white;
margin-bottom:10px;
}

/* SUB */

.sub{
font-size:16px;
margin-bottom:20px;
opacity:0.9;
}

/* MESSAGE */

.message{
font-size:17px;
line-height:1.4;
margin-bottom:25px;
}

/* IMAGE GLOW */

.main-img{
width:250px;
border-radius:20px;
margin-bottom:25px;
animation:glowImg 2.5s infinite ease-in-out;
}

@keyframes glowImg{

0%{
box-shadow:0 0 15px rgba(255,255,255,0.4);
transform:scale(1);
}

50%{
box-shadow:0 0 40px rgba(255,255,255,0.9),
0 0 80px rgba(255,105,180,0.6);
transform:scale(1.05);
}

100%{
box-shadow:0 0 15px rgba(255,255,255,0.4);
transform:scale(1);
}

}

/* BUTTON */

.btn{
padding:14px 35px;
border-radius:30px;
border:none;
background:white;
color:#333;
font-size:16px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,0.8);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* MODAL */

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#333;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
display:none;
z-index:100;
}

.close-btn{
margin-top:15px;
padding:10px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Forever With You ❤️</h1>

<div class="sub">From this day… 💖</div>

<div class="message">
Un life la naan irukanum, En life la nee irukanum… 😌 <br><br>

Love oda, faith oda, Jesus oda namma life build pannuvom 🙏✝️ <br><br>

Un kooda sirippu, Un kooda kastam, Ellam share pannitu… ❤️ <br><br>

<b>Forever… only you 💍❤️</b>
</div>

<img src="pic3.jpg" class="main-img">

<br>

<button class="btn" onclick="openModal()">Play My Voice 💌</button>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<h3>For You ❤️</h3>

<audio id="voice" controls>
<source src="voice1.mp3" type="audio/mpeg">
</audio>

<br>

<button class="close-btn" onclick="closeModal()">Close</button>

</div>

<script>

/* OPEN MODAL + PLAY */

function openModal(){
let modal = document.getElementById("modal")
let audio = document.getElementById("voice")

modal.style.display="block"
audio.play()
}

/* CLOSE */

function closeModal(){
let modal = document.getElementById("modal")
let audio = document.getElementById("voice")

modal.style.display="none"
audio.pause()
audio.currentTime = 0
}

</script>

</body>
</html>
