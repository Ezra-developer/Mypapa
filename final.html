<!DOCTYPE html>
<html>
<head>

<title>Forever With You</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
padding-top:80px;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.6;
}

/* TITLE */

h1{
font-size:70px;
text-shadow:0 0 40px white;
}

p{
font-size:26px;
max-width:700px;
margin:auto;
margin-top:20px;
}

/* IMAGE */

.slideshow{
margin-top:60px;
}

.slideshow img{
width:300px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.9);
animation:zoom 6s ease-in-out infinite alternate;
}

/* ZOOM EFFECT */

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

/* FALLING HEARTS */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<h1>Forever With You ❤️</h1>

<p>
You are not just my love,
you are my blessing and my forever.
Every moment with you is a beautiful gift.
</p>

<div class="slideshow">
<img src="pic3.jpg">
</div>

<!-- MUSIC -->

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c6f8d64c7.mp3">
</audio>

<script>

/* FALLING HEARTS */

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(4+Math.random()*2)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,400)

</script>

</body>
</html>
