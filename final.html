<!DOCTYPE html>
<html>
<head>

<title>Forever With You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
}

/* CONTAINER */

.container{
max-width:650px;
padding:10px;
}

/* TITLE */

h1{
font-size:55px;
margin-bottom:10px;
text-shadow:0 0 30px white;
}

/* MESSAGE */

.message{
font-size:18px;
line-height:1.4;
margin-bottom:20px;
}

/* IMAGE */

.main-img{
width:260px;
height:320px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.8);
margin-top:10px;
margin-bottom:15px;
}

/* BUTTON */

.btn{
padding:14px 35px;
border:none;
border-radius:30px;
background:white;
color:#333;
font-size:16px;
cursor:pointer;
box-shadow:0 0 20px white;
margin-top:10px;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#333;
padding:20px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
display:none;
z-index:999;
width:280px;
}

.close{
margin-top:10px;
padding:8px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Forever With You ❤️</h1>

<div class="message">

From this day… 💖 <br><br>

Un life la naan irukanum,  
En life la nee irukanum… 😌 <br><br>

Love oda, faith oda,  
Jesus oda namma life build pannuvom 🙏✝️ <br><br>

Un kooda sirippu,  
Un kooda kastam,  
Ellam share pannitu… ❤️ <br><br>

<b>Forever… only you 💍❤️</b>

</div>

<img src="pic3.jpg" class="main-img">

<br>

<button class="btn" onclick="playVoice()">Play My Voice 💌</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<h3>For You ❤️</h3>

<audio id="voicePlayer" controls>
<source src="voice.mp3" type="audio/mpeg">
</audio>

<br>

<button class="close" onclick="closePopup()">Close</button>

</div>

<script>

/* PLAY VOICE */

function playVoice(){
let popup = document.getElementById("popup")
let audio = document.getElementById("voicePlayer")

popup.style.display = "block"

audio.currentTime = 0
audio.play()
}

/* CLOSE */

function closePopup(){
let popup = document.getElementById("popup")
let audio = document.getElementById("voicePlayer")

popup.style.display = "none"
audio.pause()
}

</script>

</body>
</html>
