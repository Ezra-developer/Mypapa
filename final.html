<!DOCTYPE html>
<html>
<head>

<title>Forever With You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
padding-top:80px;
}

/* STARS */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 40% 70%,white,transparent),
radial-gradient(2px 2px at 60% 20%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 30% 80%,white,transparent);
opacity:0.6;
}

/* TITLE */

h1{
font-size:60px;
text-shadow:0 0 40px white;
animation:fadeIn 2s ease;
}

/* MESSAGE */

.message{
font-size:20px;
max-width:700px;
margin:auto;
margin-top:20px;
line-height:1.8;
animation:fadeIn 3s ease;
}

/* IMAGE */

.main-img{
margin-top:40px;
width:300px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.8);
animation:zoomIn 3s ease;
}

/* BUTTON */

.btn{
margin-top:40px;
padding:15px 40px;
border:none;
border-radius:40px;
background:white;
color:#333;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.95);
color:#333;
padding:25px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.3);
display:none;
z-index:100;
text-align:center;
}

.close{
margin-top:15px;
padding:8px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes zoomIn{
from{transform:scale(0.7); opacity:0;}
to{transform:scale(1); opacity:1;}
}

</style>

</head>

<body>

<h1>Forever With You ❤️</h1>

<div class="message">

From this day… 💖 <br><br>

Un life la naan irukanum,  
En life la nee irukanum… 😌  

Love oda, faith oda,  
Jesus oda namma life build pannuvom 🙏✝️  

Un kooda sirippu,  
Un kooda kastam,  
Ellam share pannitu… ❤️  

Naan un kooda than irupen… always 💫  

<b>Forever… only you 💍❤️</b>

</div>

<!-- SINGLE IMAGE -->

<img src="pic3.jpg" class="main-img">

<br>

<button class="btn" onclick="openPopup()">
Play My Voice 💌
</button>

<!-- POPUP -->

<div class="popup" id="popup">

<h3>For You ❤️</h3>

<audio controls autoplay>
<source src="voice.mp3" type="audio/mpeg">
</audio>

<br>

<button class="close" onclick="closePopup()">Close</button>

</div>

<!-- BACKGROUND MUSIC -->

<audio id="bgMusic" loop>
<source src="voice.mp3" type="audio/mpeg">
</audio>

<script>

/* POPUP */

function openPopup(){
document.getElementById("popup").style.display="block"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

/* BACKGROUND MUSIC */

document.addEventListener("click", function(){
document.getElementById("bgMusic").play()
}, { once:true })

</script>

</body>
</html>
