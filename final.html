<!DOCTYPE html>
<html>
<head>

<title>Forever With You</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
min-height:100vh;
text-align:center;
font-family:'Segoe UI',sans-serif;
color:white;
background:linear-gradient(160deg,#ff6a9f,#ffb3c6,#3a0ca3);
overflow:hidden;
padding-top:80px;
}

/* TITLE */

h1{
font-size:60px;
text-shadow:0 0 40px white;
}

p{
font-size:24px;
max-width:700px;
margin:auto;
margin-top:20px;
}

/* IMAGE */

.slideshow img{
width:300px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.9);
animation:zoom 6s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

/* BUTTON */

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:20px;
background:white;
color:#ff4d6d;
box-shadow:0 0 20px white;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff4d6d;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
transition:0.4s;
z-index:1000;
width:300px;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

/* CLOSE BUTTON */

.close-btn{
margin-top:15px;
background:#ff4d6d;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

/* HEARTS */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>

</head>

<body>

<h1>Forever With You ❤️</h1>

<p>
You are not just my love,
you are my blessing and my forever.
Every moment with you is a beautiful gift.
</p>

<div class="slideshow">
<img src="pic3.jpg">
</div>

<button onclick="openSurprise()">Open Surprise 🎁</button>

<!-- POPUP -->

<div class="popup" id="popup">
<h2>I Love You Forever ❤️</h2>
<p>You are my everything Suji 💖</p>

<!-- VOICE -->

<audio id="voice">
<source src="voice.mp3">
</audio>

<button class="close-btn" onclick="closePopup()">Close</button>

</div>

<script>

/* OPEN POPUP */

function openSurprise(){
document.getElementById("popup").classList.add("active")

// play voice
document.getElementById("voice").play()
}

/* CLOSE POPUP */

function closePopup(){
document.getElementById("popup").classList.remove("active")

// stop voice
let v=document.getElementById("voice")
v.pause()
v.currentTime=0
}

/* HEARTS */

function createHeart(){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*2)+"s"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),6000)
}

setInterval(createHeart,400)

</script>

</body>
</html>
